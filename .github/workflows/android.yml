name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Added working-directory here to point to your subfolder
    - name: Grant Execute Permission to Gradlew
      working-directory: ./HappyMinds
      run: chmod +x ./gradlew

    # Added working-directory here
    - name: Build Android APK (Debug)
      working-directory: ./HappyMinds
      run: ./gradlew assembleDebug

    # Added working-directory here
    - name: Build Android App Bundle (AAB)
      working-directory: ./HappyMinds
      run: ./gradlew bundleRelease

    # Updated the paths below to include your subfolder directory
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: HappyMinds/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: HappyMinds/app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
