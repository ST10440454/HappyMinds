name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ] # Change this to your default branch name if different
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # This step grants execute permission to the Gradle wrapper script
    - name: Grant Execute Permission to Gradlew
      run: chmod +x ./gradlew

    - name: Build Android APK (Debug)
      run: ./gradlew assembleDebug

    - name: Build Android App Bundle (AAB)
      run: ./gradlew bundleRelease

    # Upload the generated APK to GitHub Actions Artifacts
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # Upload the generated AAB to GitHub Actions Artifacts
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 7# This is a basic workflow that is manually triggered

name: Manual workflow

# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    # Inputs the workflow accepts.
    inputs:
      name:
        # Friendly description to be shown in the UI instead of 'name'
        description: 'Person to greet'
        # Default value if no value is explicitly provided
        default: 'World'
        # Input has to be provided for the workflow to run
        required: true
        # The data type of the input
        type: string

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "greet"
  greet:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
    # Runs a single command using the runners shell
    - name: Send greeting
      run: echo "Hello ${{ inputs.name }}"
