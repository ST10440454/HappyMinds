name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Tells the builder exactly which folder contains your gradle files
    - name: Setup Gradle & Build APK
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: assembleDebug
        build-root-directory: ./HappyMinds 

    - name: Build AAB
      uses: gradle/actions/setup-gradle@v3
      with:
        arguments: bundleRelease
        build-root-directory: ./HappyMinds

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
        retention-days: 7

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: "**/build/outputs/bundle/release/*.aab"
        retention-days: 7
