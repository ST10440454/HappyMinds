name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # This script automatically finds gradlew and marks it executable
    - name: Grant Execute Permission to Gradlew
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew not found anywhere in the repository!"
          exit 1
        fi
        echo "Found gradlew at: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        # Save the directory path for the next steps
        echo "PROJECT_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    # Dynamically runs assembleDebug in the correct folder
    - name: Build Android APK (Debug)
      run: |
        cd $PROJECT_DIR
        ./gradlew assembleDebug

    # Dynamically runs bundleRelease in the correct folder
    - name: Build Android App Bundle (AAB)
      run: |
        cd $PROJECT_DIR
        ./gradlew bundleRelease

    # Uploads any APK generated by the build step
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
        retention-days: 7

    # Uploads any AAB generated by the build step
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: "**/build/outputs/bundle/release/*.aab"
        retention-days: 7
