name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # This fixes the missing file issue by downloading and configuring a fresh wrapper automatically
    - name: Setup Gradle (Fallback wrapper generation)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4' # Generates a stable wrapper automatically if missing

    # Runs the APK build step specifically targeting your inner project directory
    - name: Build Android APK (Debug)
      run: gradle assembleDebug
      working-directory: ./HappyMinds

    # Runs the AAB bundle step targeting your inner project directory
    - name: Build Android App Bundle (AAB)
      run: gradle bundleRelease
      working-directory: ./HappyMinds

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
        retention-days: 7

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: "**/build/outputs/bundle/release/*.aab"
        retention-days: 7
