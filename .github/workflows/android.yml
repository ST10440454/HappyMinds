name: Android Build & Artifact Upload

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Fixes the permission denied issue for the Gradle wrapper script
    - name: Grant Execute Permission to Gradlew
      run: chmod +x ./gradlew

    # Generates the Debug APK file
    - name: Build Android APK (Debug)
      run: ./gradlew assembleDebug

    # Generates the Release AAB file
    - name: Build Android App Bundle (AAB)
      run: ./gradlew bundleRelease

    # Uploads the built APK so you can download it from GitHub
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    # Uploads the built AAB so you can download it from GitHub
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
